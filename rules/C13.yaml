ID: C13
분류: 세트/렙/강도 처방
이름: 모든 세트 동일 미달 (Stall 1회차)
한줄설명: 모든 워킹 세트가 목표렙 미달이면 1주 더 동일 무게 유지(밀어내기). 그래도 미달이면 C13 적용
언제_발동: 세션 종료 직후
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 세트별 미달 횟수
- 연속 stall 주차
하는_일: 무게·렙 유지, 1주 재시도. 수면/영양/스트레스 체크 프롬프트
활용_예시: 스쿼트 3×5 100kg에서 4,4,3 → 다음 주 100kg 재시도
근거:
  출처: Greg Nuckols, Stronger By Science — How to Deal with Failed Reps
  주소: https://www.strongerbyscience.com/reps-sets/
  신뢰도: ★★☆
