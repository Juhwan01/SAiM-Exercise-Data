ID: D15
분류: 주기화 모델
이름: 초보자 증량 폭(점프) 디폴트
한줄설명: |-
  하체(스쿼트·데드)는 세션당 +5kg(초기 +10kg 가능), 상체(벤치·OHP·로우)는 +2.5kg(초기 +5kg). 실패 시 절반 또는 디로드
언제_발동: 매 세션 성공 후
쓰임새:
  운동_추천: true
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 직전 세션 성공/실패
- 운동 종목
하는_일: 다음 세션 무게 자동 계산
활용_예시: 60kg 스쿼트 5x5 성공 → 다음 세션 62.5kg 제안
근거:
  출처: Mark Rippetoe, "Incremental Increases"
  주소: https://startingstrength.com/article/incremental_increases
  신뢰도: ★★☆
적용_위치:
  매트릭스:
  - 목표: 벌크업
    모듈: 온보딩
  - 목표: 스트렝스
    모듈: 온보딩
  - 목표: 근육량 증가
    모듈: 온보딩
