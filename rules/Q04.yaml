ID: Q04
분류: 부상 관리
이름: 요추 통증 단계별 프로토콜
한줄설명: |-
  급성 0~3일: 침상안정 회피, 통증 허용 범위 내 일상 활동 유지·통증 중심화 반응 보이는 자세(McKenzie 신전 우선) 탐색 | 아급성 3~14일: 그룹/개별 운동요법(스트레칭·근력·유산소·운동조절) 시작, 신경역동 운동·도수치료는 운동의 보조로만 | 복귀 14일~: 글루트·코어 활성화 후 힙힌지 재학습, 데드/스쿼트는 추정 1RM의 30%부터 주 +10% 이내 점진. 적색기(다리 양측 저림·안장마비·괄약근/배뇨이상·발열·암 병력 동반 통증·외상 후 통증)→즉시 의료기관 의뢰
언제_발동: 통증 발생 시 / 재활 단계별
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 통증 부위·강도(NPRS 0~10)·발생 동작·일수·다리 저림 유무
하는_일: 단계 분류 + 허용/회피 운동 리스트 + 재시작 무게 % + 의뢰 사유
활용_예시: |-
  사용자: '데드 110kg 후 허리 통증 NPRS 6, 어제 발생' → 출력: '급성기. 오늘은 가벼운 보행·골반 틸트·McKenzie 엎드려 신전 5×10회 시도. 데드/스쿼트 일시 중지. 3일 후 통증 NPRS 3 이하면 30kg(추정 1RM 30%)부터 RDL 재개. 다리 저림이 종아리 아래로 내려가거나 양측이면 의료기관 상담'
근거:
  출처: NICE NG59 (2016/2020 surveillance) + Foster 2018 Lancet LBP series
  주소: https://www.nice.org.uk/guidance/ng59
  신뢰도: ★★★
적용_위치:
  매트릭스: []
  별도_레이어:
  - 부상 이벤트 트리거
