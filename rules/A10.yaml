ID: A10
분류: RPE 자율조절
이름: 종목·근육군별 변환 보정
한줄설명: |-
  단관절·소근육·고렙 영역에서 같은 RPE라도 실제 %1RM이 표보다 낮음. 스쿼트·벤치는 표에 가깝고 데드는 RPE9~10에서 +1~2%p 더 무거움. 8렙 초과/팔·어깨 단관절은 -3~5%p 하향
언제_발동: 세션 전 무게 추천 시
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 운동 종목
- 근육군
하는_일: 표 셀 결과 × 종목 보정계수 (스쿼트 1.00 / 벤치 1.00 / 데드 1.01 / 단관절 0.95)
활용_예시: '''사이드 레터럴 12렙 RPE8'' → 표 67.5% × 0.95 = 64% 처방'
근거:
  출처: Helms RPE accuracy 시리즈 (MASS) / Tuchscherer 종목별 차트
  주소: https://massresearchreview.com/2023/05/22/rpe-and-rir-the-complete-guide/
  신뢰도: ★★☆
적용_위치:
  매트릭스:
  - 목표: 벌크업
    모듈: 세트별 처방
  - 목표: 스트렝스
    모듈: 세트별 처방
  - 목표: 근육량 증가
    모듈: 세트별 처방
  별도_레이어: []
