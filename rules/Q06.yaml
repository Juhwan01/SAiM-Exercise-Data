ID: Q06
분류: 부상 관리
이름: 무릎 PFPS(슬개대퇴 통증) 단계별 프로토콜
한줄설명: |-
  급성 0~2주: 통증 유발 동작(딥 스쿼트·런지·계단 내려오기·오픈체인 레그익스텐션 90°→0°) 회피, 활동 수정·교육 우선 | 아급성 2~6주: 고관절(외전·외회전, 클램쉘·사이드 라잉 힙 어브덕션·몬스터 워크)+대퇴사두(미니 스쿼트 0~45°, 레그프레스 짧은 ROM) 복합 강화, 통증 NPRS≤3 허용. 단기 진통은 슬개골 테이핑 보조 가능 | 복귀 6주~: 스쿼트/런지 ROM을 통증 한도 내 점진 확장, 무게는 통증 무관 자세 가능 시 1RM 30%부터 주 +10%. 풀스쿼트는 통증 0/10 + 편측 근력차 <10% 확인 후. 적색기(외상 후 부종·잠김(locking)·이탈감·체중부하 불가·발적/발열)→정형외과 의뢰
언제_발동: 통증 발생 시 / 재활 단계별
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 통증 부위·강도(NPRS)·유발 동작·부종/잠김 유무
하는_일: 단계 분류 + 허용/회피 운동 리스트 + 재시작 무게 % + 의뢰 사유
활용_예시: |-
  사용자: '백스쿼트 80kg 바닥에서 무릎 앞쪽 통증 NPRS 5, 계단 내려올 때도 아픔' → 출력: '아급성기 진입. 풀ROM 스쿼트·계단 내려오기 2주 회피. 클램쉘 3×15·사이드 라잉 힙 어브덕션 3×15·미니 스쿼트(0~45°) 3×10·레그프레스 짧은 ROM 24kg(1RM 30%)부터. 4주 후 통증 NPRS≤2면 박스 스쿼트(평행)부터 점진 ROM 확장. 무릎 잠김/부종 새로 생기면 의뢰'
근거:
  출처: Powers 2017 BJSM consensus + Crossley 2016 BJSM Part 2 + Barton 2015 BJSM
  주소: https://pubmed.ncbi.nlm.nih.gov/29109118/
  신뢰도: ★★★
적용_위치:
  매트릭스: []
  별도_레이어:
  - 부상 이벤트 트리거
