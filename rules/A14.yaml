ID: A14
분류: RPE 자율조절
이름: 강도 의존성 보정 (>85% 1RM)
한줄설명: |-
  고강도 영역(<5렙, ≥85% 1RM)에선 1 RPE 오차당 RM 변화가 4.5%로 큼. 보수적으로 -5%(컴파운드)/디폴트 +1단계 더 깎기. 저강도(>10렙)는 2~3%만
언제_발동: 세트 직후
쓰임새:
  운동_추천: false
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 현재 %1RM 추정치
- 렙수
하는_일: 보정 폭 자동 조정 (5%/3%/2%)
활용_예시: '데드 3렙 90% 1RM RPE9 입력(목표8): -5%. 사이드레터럴 15렙 70% RPE9: -2%'
근거:
