ID: A01
분류: RPE 자율조절
이름: RPE 정의
한줄설명: 세트 후 "몇 회 더 가능했나"(RIR)로 강도 측정. 1회 남으면 RPE9, 2회 남으면 RPE8
언제_발동: 세트 직후
쓰임새:
  운동_추천: false
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 사용자가 입력한 RPE (0~10)
하는_일: RIR로 변환 → 다음 세트 보정의 기준값
활용_예시: '앱 UI: ''이 세트 RPE는?'' 슬라이더 → DB 저장 → 다음 세트 알고리즘 입력'
근거:
  출처: Zourdos 2016 (Tuchscherer RPE 검증)
  주소: https://pubmed.ncbi.nlm.nih.gov/26049792/
  신뢰도: ★★★
