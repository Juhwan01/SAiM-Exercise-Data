ID: G06
분류: 회복/디로드
이름: 고피로 시 강도까지 동시 감축
한줄설명: 피로가 매우 높으면(관절통·수면 저하 동반) 세트도 ½ + 무게도 50% 동시 감축. 일반 피로면 볼륨만 ½
언제_발동: 디로드 주 (피로 高)
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 누적 피로 신호(관절통·수면·동기 점수)
하는_일: '강도 감축 여부 결정: 일반=무게 유지 / 고피로=무게 50%'
활용_예시: 디로드 직전 4주 RPE 평균 9 초과 + 수면 6h 미만 → 무게 50%·세트 ½
근거:
  출처: Israetel / Renaissance Periodization "Advanced Deload Strategies"
  주소: https://renaissanceperiodization.com/dr-mike-israetel-compilation/
  신뢰도: ★★☆
