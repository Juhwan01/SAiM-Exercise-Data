ID: R08
분류: 행동 코칭
이름: 외부 보상 vs 내재 동기 (crowding-out)
한줄설명: |-
  흥미로운 활동에 "돈·뱃지·등수" 같은 유형 보상을 일률 지급하면 내재 동기를 평균 -0.36 SD 감소시킴(Deci 1999 메타분석, k=128). 예상치 못한 보상·정보적 피드백은 영향 없음
언제_발동: 보상 시스템 설계 시
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자가 운동을 ""재미있다""고 답한 빈도 + 보상 시스템 노출 여부
하는_일: 흥미·자율 동기가 이미 높은 사용자에게는 금전·뱃지 보상 노출 최소화. 대신 진척 데이터·개선 피드백 위주로 표시
활용_예시: '설계 결정: 신규 사용자는 출석 뱃지 노출 / 6개월+ 자발 운동 사용자는 뱃지 OFF·진척 그래프 강조'
근거:
  출처: Deci, Koestner & Ryan 1999 (Psychological Bulletin meta-analysis)
  주소: https://psycnet.apa.org/doi/10.1037/0033-2909.125.6.627
  신뢰도: ★★★
적용_위치:
  매트릭스:
