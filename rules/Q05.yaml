ID: Q05
분류: 부상 관리
이름: 어깨 임핀지·회전근개 통증(RCRSP) 단계별 프로토콜
한줄설명: |-
  급성 0~7일: 통증 유발 동작(오버헤드·behind-the-neck·딥 호리젠탈 어덕션) 회피, 통증 허용 ROM 내 진자운동·견갑 후퇴/하강 활성 | 아급성 1~6주: 점진적 근력부하(통증 NPRS≤4 허용)—외회전 강화(밴드 ER), 견갑 안정화(서라투스 펀치·로우), 후방관절낭 스트레칭(sleeper/cross-body), GIRD 교정 | 복귀 6주~: 어깨 압박 운동(벤치·OHP·풀업)을 추정 1RM 30%부터 점진(주 +10%), 오버헤드는 통증 0/10 + 외회전 좌우차 <10% 확인 후. 적색기(외상 후 거상 불가·진행성 위약·야간통+종괴·발열·상지 신경학적 결손)→정형외과 의뢰
언제_발동: 통증 발생 시 / 재활 단계별
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 통증 부위·강도(NPRS)·유발 동작·외상 유무
하는_일: 단계 분류 + 허용/회피 운동 리스트 + 재시작 무게 % + 의뢰 사유
활용_예시: |-
  사용자: '오버헤드 프레스 50kg 셋업 시 어깨 앞쪽 찌릿 NPRS 5' → 출력: '급성기. 오버헤드 1주 중지, behind-the-neck·업라이트 로우도 회피. 대신 풀업 행잉·진자운동·밴드 외회전 3×15. 1주 후 통증 감소 시 덤벨 OHP를 1RM 30%부터 재시작, 견갑 후퇴/하강 셋업 강조. 야간통이 심해지거나 팔 들 수 없으면 의뢰'
근거:
  출처: Lewis 2016 Man Ther + Cools 2015 Braz J Phys Ther
  주소: https://pubmed.ncbi.nlm.nih.gov/27083390/
  신뢰도: ★★★
적용_위치:
  매트릭스: []
  별도_레이어:
  - 부상 이벤트 트리거
