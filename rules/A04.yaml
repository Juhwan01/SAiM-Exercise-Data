ID: A04
분류: RPE 자율조절
이름: RIR 예측 정확도 보정
한줄설명: 사용자는 RIR을 평균 1회 정도 과소예측 (특히 RIR≥3 입력 시 더 부정확)
언제_발동: 세트 직후
쓰임새:
  운동_추천: false
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 사용자 입력 RIR
하는_일: 내부값 = 입력값 + 보정계수(0~+1)
활용_예시: 초보자/노인은 +1 보정 강하게. 중·고급자는 약하게. 정확한 강도 추정에 필수
근거:
  출처: MASS Research / Bastos 2024
  주소: https://pmc.ncbi.nlm.nih.gov/articles/PMC11127506/
  신뢰도: ★★☆
