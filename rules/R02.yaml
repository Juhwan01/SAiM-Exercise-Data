ID: R02
분류: 행동 코칭
이름: 습관 형성 평균 66일
한줄설명: |-
  새 행동이 자동화되는 데 평균 66일(개인차 18~254일). cue(시각·시간·장소) → routine(행동) → reward(보상) 3요소를 같은 맥락에 묶을 때 형성 속도가 빨라짐
언제_발동: 초기 4주
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자의 운동 시작일 + 주당 출석 기록
하는_일: |-
  D+0~66일은 "습관 형성 구간"으로 표시. 매일 같은 시간·장소 권고. 1~2회 빼먹어도 자동화 곡선에 거의 영향 없음을 안내(과도한 죄책감 차단)
활용_예시: |-
  사용자 '3일 빠졌는데 다 망한 거죠?' → 챗봇 'Lally 2010 연구상 1~2일 결손은 자동화 곡선에 유의한 영향 없음. 내일 같은 시간·같은 장소로 복귀하세요. 평균 자동화까지 D+45일 남음'
근거:
  출처: Lally et al. 2010 (Eur J Soc Psychol)
  주소: https://onlinelibrary.wiley.com/doi/10.1002/ejsp.674
  신뢰도: ★★☆
