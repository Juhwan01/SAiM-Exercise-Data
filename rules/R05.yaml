ID: R05
분류: 행동 코칭
이름: 첫 6개월 이탈률
한줄설명: 미국 헬스장 신규 회원의 약 50%가 가입 첫 6개월 내 이탈(IHRSA 보고). 한국도 비슷한 패턴 보고됨. 첫 90일이 가장 위험 구간
언제_발동: 초기 온보딩 + 1·3·6개월 체크포인트
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자 가입일 + 최근 14일 출석 횟수
하는_일: D+0~180일 사용자는 "고위험 코호트"로 분류. 출석 5일 공백 시 푸시 알림 + 운동 강도 -20% 조정안 제시(부담 차단)
활용_예시: 사용자 가입 후 D+45일에 7일째 미출석 → 챗봇 '신규 가입자 절반은 6개월 내 그만둡니다. 오늘은 20분 짧은 루틴 어떠세요?' 자동 발송
근거:
