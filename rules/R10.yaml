ID: R10
분류: 행동 코칭
이름: 한국 직장인 시간 충돌·회식 대응
한줄설명: |-
  한국 임금근로자 주당 평균 근로시간 약 38~40시간(KOSIS), 회식 빈도 월 2~4회 보고. 회식 당일은 운동 패스 대신 익일 보강(20분 단축 세션) + 알코올 24시간 내 근비대 신호 -37% 감소 고려
언제_발동: 주간 일정 조정
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자의 근무 형태 + 회식 일정(캘린더 연동) + 주당 운동 가능 일수
하는_일: |-
  회식 캘린더 감지 시: 당일은 휴식 권고 + 익일은 "20분 압축 루틴"(메인 운동 3개 5x5만) 자동 제안. 주간 볼륨 -10~15% 자동 조정으로 미달 보강
활용_예시: |-
  사용자 '오늘 회식이라 운동 못 가요' → 챗봇 '내일 20분 압축 세션(스쿼트·벤치·로우 5x5)으로 주간 볼륨 92% 회복 가능. 음주 후 24시간은 근비대 신호가 줄어드니 폼 위주로'.
근거:
  출처: KOSIS 임금근로일자리 근로시간 통계 + 자체 룰 (Parr 2014 알코올·근단백질합성 참고)
