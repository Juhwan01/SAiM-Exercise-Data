ID: R01
분류: 행동 코칭
이름: SMART 목표 설정
한줄설명: |-
  목표는 Specific(구체)·Measurable(측정)·Achievable(달성)·Relevant(관련)·Time-bound(기한) 5요소로 분해해야 수행과 지속이 향상됨. 모호한 목표("열심히 하기")보다 구체적·도전적 목표가 수행을 유의하게 높임
언제_발동: 초기 온보딩
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자가 입력한 목표 문장 + 현재 1RM/체중/주당 운동 횟수
하는_일: 'SMART 5요소 누락 항목 자동 점검 → 12주 단위 도전적 수치 목표로 재작성 (예: ''벤치 80→90kg, 12주, 주 3회 5x5'')'
활용_예시: |-
  사용자 '근육 키우고 싶어요' 입력 → 챗봇 '구체적으로: ① 어느 부위 ② 12주 후 어느 수치(체중·둘레·1RM)까지 ③ 주 몇 회 운동 가능한가요?' 재질문
근거:
  출처: Locke & Latham 2002 (American Psychologist)
  주소: https://psycnet.apa.org/doi/10.1037/0003-066X.57.9.705
  신뢰도: ★★☆
적용_위치:
