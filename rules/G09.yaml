ID: G09
분류: 회복/디로드
이름: 활성 디로드 vs 완전 휴식 선택
한줄설명: |-
  기본은 활성 디로드(G05 처방)로 strength 손실 방지. 완전 휴식 1주는 하체 strength 소폭 감소 위험, 부상·번아웃·수면<5h 지속 시에만 사용
언제_발동: 디로드 주 결정 시
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 부상 여부
- 번아웃 척도
- 수면 평균
하는_일: '"활성"(권장) 또는 "패시브 1주" 선택 후 처방 분기'
활용_예시: 7개월 연속 훈련 + 동기 1/5 → 1주 완전 휴식 허용. 그 외엔 활성 권장
근거:
  출처: Coleman et al. 2024 PeerJ (1주 완전 휴식 RCT)
  주소: https://pmc.ncbi.nlm.nih.gov/articles/PMC10809978/
  신뢰도: ★★★
