ID: P05
분류: 스트레칭
이름: 정적 스트레칭 회피 (워밍업 시)
한줄설명: 워밍업 단계에서 ≥45~60초 정적 스트레칭은 최대 근력 평균 -5.4% 감소 — 동적 스트레칭으로 대체
언제_발동: 본 세트 직전 60분 이내
쓰임새:
  운동_추천: true
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 사용자의 워밍업 루틴 입력
하는_일: 정적 스트레칭 감지 시 동적(레그스윙·아키바이크)으로 대체 안내
활용_예시: 사용자가 "햄스트링 30초 정적 스트레칭" 입력 → 동적 대체 권고 메시지
근거:
  출처: Simic et al. 2013, Scand J Med Sci Sports — meta-analysis
  주소: https://pubmed.ncbi.nlm.nih.gov/22316148/
  신뢰도: ★★★
