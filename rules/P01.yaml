ID: P01
분류: 스트레칭
이름: 운동 전 스트레칭 (정/동적)
한줄설명: 운동 전 정적 스트레칭(60s+)은 근력↓. 동적 스트레칭이 워밍업에 우월. 정적은 운동 후/별도 세션
언제_발동: 세션 전
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 세션 시점
하는_일: 워밍업 시퀀스 제외/포함
활용_예시: RAMP 워밍업 시 정적 스트레칭 자동 제외
근거:
  출처: Behm 2016 메타분석
