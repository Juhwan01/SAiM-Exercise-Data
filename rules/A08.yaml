ID: A08
분류: RPE 자율조절
이름: RIR ↔ RPE 매핑 정의
한줄설명: |-
  RPE 10=0 RIR(완전 실패), 9.5=0.5, 9=1, 8.5=1.5, 8=2, 7.5=2.5, 7=3, 6.5=3.5 RIR. 6 이하는 워밍업 영역
언제_발동: 세트 직후
쓰임새:
  운동_추천: false
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 사용자 입력 RPE
하는_일: 내부 RIR 값으로 변환 → 다음 세트 무게 산출 입력
활용_예시: '코칭 UI: ''1회 더 가능했음'' 탭 → RPE 9 → DB에 RIR=1 기록'
근거:
  출처: Zourdos 2016 (RIR-based RPE Scale, J Strength Cond Res 30(1):267-275)
  주소: https://pubmed.ncbi.nlm.nih.gov/26049792/
  신뢰도: ★★★
적용_위치:
  매트릭스:
  - 목표: 다이어트
    모듈: 세트별 처방
  - 목표: 벌크업
    모듈: 세트별 처방
  - 목표: 스트렝스
    모듈: 세트별 처방
  - 목표: 근육량 증가
    모듈: 세트별 처방
