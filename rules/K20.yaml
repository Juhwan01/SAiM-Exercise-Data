ID: K20
분류: 영양
이름: Katch-McArdle BMR 공식 (체지방률 알 때)
한줄설명: BMR=370+(21.6×LBM kg). LBM=체중×(1-체지방률). 근육량 많은 사용자에서 Mifflin보다 정확
언제_발동: 인바디·체지방률 입력 후
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 체중(kg)
- 체지방률(%)
하는_일: BMR (kcal/일) — 제지방량 기반
활용_예시: 인바디 결과 입력한 사용자에 한해 K19 대신 자동 사용. 체지방률 미입력 시 K19로 폴백
