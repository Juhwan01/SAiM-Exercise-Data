ID: C02
분류: 세트/렙/강도 처방
이름: Repetition Continuum
한줄설명: 근력 ≥85%/1~6렙, 근비대 67~85%/6~12렙, 근지구력 ≤67%/12+렙 (단 근비대는 6~30렙 폭넓게 가능)
언제_발동: 세션 전
쓰임새:
