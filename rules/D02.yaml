ID: D02
분류: 주기화 모델
이름: Daily Undulating (DUP)
한줄설명: 같은 주 내 일별 비대-근력-파워 변경. 9~12주에 LP보다 약간 우월. 중급+ 권장
언제_발동: 주간 단위
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자 레벨(중·고급)
하는_일: 요일별 변수 다른 처방
활용_예시: 월=비대(10렙), 수=근력(5렙), 금=파워(3렙) 자동 분배
근거:
  출처: Painter 2012 / Colquhoun 2017
  주소: https://pubmed.ncbi.nlm.nih.gov/22173008/
  신뢰도: ★★★
