ID: R04
분류: 행동 코칭
이름: 자율적 동기 (자율성·유능감·관계성)
한줄설명: |-
  자기결정이론(SDT): 내재 동기는 ①자율성(스스로 선택) ②유능감(잘하고 있다는 감각) ③관계성(연결감) 3가지 기본심리욕구가 충족될 때 강화됨. 강제·외압은 동기를 갉아먹음
언제_발동: 상시
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자의 프로그램 수행률 + 자율 선택 비율(추천 vs 직접 선택)
하는_일: |-
  운동 종목·세트 수를 강제하지 않고 "오늘 컨디션상 80% / 100% / 110% 중 선택" 식 옵션 제공. 매주 1회 진척 그래프로 유능감 피드백
활용_예시: |-
  사용자 '코치가 짜준 프로그램 따라하기 싫어요' → 챗봇 '오늘은 메인 운동 3가지 중 직접 골라보세요(스쿼트/레그프레스/런지). SDT 자율성 충족이 장기 지속률을 높입니다'
근거:
  출처: Ryan & Deci 2000 (American Psychologist)
  주소: https://selfdeterminationtheory.org/SDT/documents/2000_RyanDeci_SDT.pdf
  신뢰도: ★★☆
