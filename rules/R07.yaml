ID: R07
분류: 행동 코칭
이름: 사회적 지지·운동 파트너 효과
한줄설명: |-
  운동 그룹 응집력(group cohesion)은 운동 출석·지속률에 중간 효과크기로 양의 영향. 파트너·소그룹·온라인 챌린지 모두 단독보다 지속률↑ (Carron 메타분석)
언제_발동: 초기 온보딩 + 정체기
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자의 운동 파트너 유무 + 그룹/챌린지 참여 여부
하는_일: 파트너 부재 시 "함께하기" 기능(친구 초대·앱 내 챌린지 매칭) 노출. 그룹 출석 시 개인 출석 가중 +1로 시각화
활용_예시: |-
  사용자 '혼자 하니까 자꾸 빼먹어요' → 챗봇 'Carron 메타분석상 그룹 운동이 단독 대비 출석률 유의 향상. 같은 시간대 운동하는 사용자 5명 매칭해드릴까요?'
근거:
  출처: Carron Hausenblas Mack 1996 / Burke et al. 2006 (group cohesion meta)
  주소: https://pubmed.ncbi.nlm.nih.gov/15518332/
  신뢰도: ★★☆
