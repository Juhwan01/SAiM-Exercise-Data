ID: K23
분류: 영양
이름: 추정식 정확도 한계·재측정 권장
한줄설명: Mifflin도 ±10% 오차 존재. 2주간 칼로리 일정+체중 변화로 실측 보정. 정체 시 ±10~15% 조정
언제_발동: 4주마다 / 체중 정체 시
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 2주 평균 칼로리
- 2주 체중 변화(kg)
하는_일: TDEE 보정값 = 입력칼로리 ± (체중변화×7700/14)
활용_예시: 유지 칼로리 정했는데 2주간 체중 -1kg → 실제 TDEE 추정치보다 -500kcal 낮음. 자동 재보정 알림
근거:
  출처: Frankenfield, Roth-Yousey, Compher 2005 (J Am Diet Assoc 105:775)
  주소: https://pubmed.ncbi.nlm.nih.gov/15883556/
  신뢰도: ★★★
적용_위치:
  매트릭스:
