ID: C12
분류: 세트/렙/강도 처방
이름: 마지막 세트만 미달 (Top-set drop-off)
한줄설명: 첫 1~2세트는 목표 달성, 마지막 세트만 1~2렙 부족이면 무게 유지하고 다음 세션 동일 무게 재시도 (정상적 피로 반응)
언제_발동: 세션 종료 직후
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 세트별 목표렙 vs 실제렙
- 미달 세트 위치
하는_일: 다음 세션 무게 동일, 부족분 다음 세션에 회수 시도
활용_예시: 벤치 60kg×5,5,4 (목표 5,5,5) → 다음 세션 60kg×5,5,5 도전
근거:
  출처: Rippetoe & Kilgore, Practical Programming for Strength Training 3rd ed.
  주소: https://startingstrength.com/article/training
  신뢰도: ★★☆
적용_위치:
  매트릭스:
  - 목표: 다이어트
    모듈: 세트 후 학습
  - 목표: 벌크업
    모듈: 세트 후 학습
  - 목표: 스트렝스
    모듈: 세트 후 학습
  - 목표: 근육량 증가
    모듈: 세트 후 학습
  별도_레이어: []
