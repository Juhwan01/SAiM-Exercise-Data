ID: R06
분류: 행동 코칭
이름: 정체기 심리 대응
한줄설명: |-
  4~6주 PR 정체 시 즉각 "실패"로 해석하지 말고 ①진척 정의 재설정(중량 외 볼륨·폼·컨디션) ②1주 디로드(볼륨 -40~50%) ③프로그램 구조 변경 순으로 대응. 심리적 burnout 방지
언제_발동: 정체기 감지 시
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 최근 4~6주 PR 갱신 여부 + 주관적 피로(RPE 추세)
하는_일: |-
  4주 정체 + RPE 평균 ≥8 → 자동 "디로드 1주" 권고. 정체기 카드에 "중량은 멈췄지만 출석률·폼·총 볼륨은 +15%" 식 비-중량 진척 표기
활용_예시: |-
  사용자 '4주째 벤치 PR이 안 갱신돼요. 그만둘까 봐요' → 챗봇 'RPE 평균 8.5로 누적 피로 신호. 다음 주 디로드(볼륨 -50%) 후 재시도 제안. 출석률 92%는 그대로 진척입니다'
근거:
  출처: Stronger by Science (Helms / Nuckols, deload guidance)
  주소: https://www.strongerbyscience.com/deload/
  신뢰도: ★☆☆
