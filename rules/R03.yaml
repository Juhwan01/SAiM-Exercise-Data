ID: R03
분류: 행동 코칭
이름: 자기효능감 4가지 원천
한줄설명: |-
  자기효능감("나는 할 수 있다") 형성 4원천: ①숙달 경험(직접 성공) ②대리 경험(타인 성공 관찰) ③언어적 설득(피드백) ④생리적 상태(피로·각오 해석). 숙달 경험이 가장 강력
언제_발동: 초기 온보딩 + 정체기
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용자의 PR(개인 최고기록) 갱신 이력 + 출석 연속 일수
하는_일: 매주 작은 PR(중량·반복·세트)을 시각화해 "숙달 경험" 누적을 보여줌. 정체기에는 비슷한 체급 사용자 진척 사례(대리 경험) 제시
활용_예시: |-
  사용자 '저는 운동에 재능이 없는 것 같아요' → 챗봇 '지난 4주간 스쿼트 60→67.5kg(+12.5%) 갱신했습니다. 이게 Bandura가 말한 숙달 경험이에요. 같은 체급 사용자 평균 +8%보다 빠른 속도'.
근거:
  출처: Bandura 1977 (Psychological Review)
  주소: https://psycnet.apa.org/doi/10.1037/0033-295X.84.2.191
  신뢰도: ★★☆
