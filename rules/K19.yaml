이름: Mifflin-St Jeor BMR 공식 (1순위)
한줄설명: '남: BMR=10×W(kg)+6.25×H(cm)-5×나이+5 / 여: 동일식 -161. 비만·정상 모두 가장 정확(±10%)한 1차 권장식'
