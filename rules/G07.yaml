ID: G07
분류: 회복/디로드
이름: 디로드 트리거 신호 (다지표 자동)
한줄설명: |-
  다음 중 ≥2개 충족 시 익주 디로드 자동 권고: ①RPE drift +1.5 이상 ②수면 <6h 주 4일+ ③관절통 NPRS ≥4 ④동기 ≤2/5 ⑤최근 PR 후 14일 경과
언제_발동: 매주말 자동 평가
쓰임새:
  운동_추천: false
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 주간 RPE 추이
- 수면
- 통증 NPRS
- 동기 점수
하는_일: '"디로드 권고" 알림 + 다음 주 처방 자동 G05/G06으로 전환'
활용_예시: 4주차 종료 시 RPE +1.7 & 수면 5.2h 평균 → 5주차 자동 디로드 처방
근거:
  출처: Bell et al. 2023 Delphi Consensus (Sports Medicine - Open)
  주소: https://pmc.ncbi.nlm.nih.gov/articles/PMC10511399/
  신뢰도: ★★★
