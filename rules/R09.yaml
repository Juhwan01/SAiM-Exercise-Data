ID: R09
분류: 행동 코칭
이름: 운동 강박·RED-S 스크리닝
한줄설명: |-
  저에너지가용성(LEA: <30 kcal/kg FFM/day) 지속 시 RED-S 위험. 신호: 급격한 체중 감소·휴식기 심박 변화·여성 무월경·만성 피로·강박적 운동. 의학적 진단·치료는 의료진 영역
언제_발동: 상시 모니터링
쓰임새:
  운동_추천: false
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 주당 운동 시간 + 식사 빈도/총 칼로리 + (여성) 월경 주기 + 휴식기 심박
하는_일: |-
  위험 신호 ≥3개 발견 시 "운동량 -30% 권고 + 의료/영양 전문가 상담 안내" 카드 표시. 챗봇은 진단·처방 금지(의료법 회피), "스포츠의학 전문의 상담을 권합니다"로 한정
활용_예시: |-
  사용자 '주 10회 운동, 식사 1500kcal, 3개월째 월경 없어요' → 챗봇 'IOC 2018 RED-S 기준상 위험 신호입니다. 운동량 일시 -30% 조정 + 스포츠의학 전문의/영양사 상담을 강하게 권합니다. 본 앱은 진단을 제공하지 않습니다'
근거:
  출처: Mountjoy et al. 2018 IOC RED-S Consensus Update (BJSM)
  주소: https://bjsm.bmj.com/content/52/11/687
  신뢰도: ★★★
적용_위치:
  매트릭스:
  - 목표: 다이어트
    모듈: 행동·안전
  별도_레이어: []
