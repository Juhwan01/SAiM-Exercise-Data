ID: I08
분류: 기타
이름: 무거운 워크업 우선 권고 (시간 부족 시)
한줄설명: 시간 부족하면 가벼운 세트 생략하고 무거운 워크업(작업의 80% 부근 ×3~5)을 살릴 것 — 10RM의 80% 워밍업이 총 볼륨 최다
언제_발동: 시간 부족 시 워크업 단축 결정
쓰임새:
  운동_추천: true
  실시간_코칭: false
  지식베이스: true
필요한_정보:
- 사용 가능 시간
- 본 세트 무게
하는_일: 3세트 못할 시 80%×3~5만 1세트 권장
활용_예시: 시간 5분 남음 → 빈 봉·40·60% 생략, 80%×3 → 본 세트 진행
근거:
