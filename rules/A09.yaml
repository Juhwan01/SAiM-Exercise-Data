ID: A09
분류: RPE 자율조절
이름: RPE 변환표 정확도/검증 한계
한줄설명: |-
  표는 경험적(Tuchscherer 코칭)이며 Zourdos 2016에서 RIR 매핑은 검증됐으나 셀별 %1RM은 ±2~5%p 오차. 경험자가 1RM에서 RPE 더 정확. 초보·RIR≥3 구간은 과소예측 (A04와 동일 보정 필요)
언제_발동: 세션 후 캘리브레이션
쓰임새:
  운동_추천: false
  실시간_코칭: true
  지식베이스: true
필요한_정보:
- 사용자 경험 레벨
- 종목
하는_일: '보정계수: 초보 ±5%p · 중급 ±3%p · 고급 ±2%p 신뢰구간'
활용_예시: '''예상 RPE 8 → 실제 RPE 9.5''가 3세션 연속이면 표 수치를 -3%p 자동 캘리브레이션'
근거:
  출처: Zourdos 2016 / Helms 2017 RPE accuracy
  주소: https://pubmed.ncbi.nlm.nih.gov/26049792/
  신뢰도: ★★★
